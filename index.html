<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delivery Codes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background: #ffffff;
      transition: background 0.4s ease;
    }

    body.no-codes {
      background: #1c1c1e;
    }

    .content {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
    }

    body.has-codes .content {
      display: flex;
    }

    .amazon-logo {
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .amazon-logo img {
      height: 36px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 7px;
      vertical-align: middle;
    }

    .today {
      font-size: 14px;
      color: #999;
      margin-bottom: 6px;
    }

    .title-main {
      font-size: 26px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }

    .title-sub {
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .cards {
      width: 100%;
      display: grid;
      gap: 0.75rem;
    }

    .card {
      background: #f7f7f7;
      border: 1px solid #ebebeb;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.2rem;
    }

    .name {
      font-weight: 600;
      color: #111;
    }

    .separator {
      color: #bbb;
      font-weight: 300;
      margin: 0 0.25em;
    }

    .code {
      font-weight: 600;
      color: #111;
      letter-spacing: 0.1em;
      font-variant-numeric: tabular-nums;
    }

    .status {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 11px;
      color: #ccc;
      font-family: monospace;
    }

    body.no-codes .status {
      color: #444;
    }
  </style>
</head>
<body class="no-codes">

  <div class="content">
    <div class="amazon-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
    </div>
    <div class="header">
      <div class="today"><span class="dot"></span><span id="today-text"></span></div>
      <div class="title-main">One-Time Password</div>
      <div class="title-sub">Delivery Codes</div>
    </div>
    <div class="cards" id="cards"></div>
  </div>

  <div class="status" id="status">checking...</div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzFRcUINLVndvIHar-ul28an2R8rzK6koqUB-_DfvLV4Q_9HuRsNKU57tNK1Tuw-gj_WQ/exec';

    function getFontSize(count) {
      if (count === 1) return '72px';
      if (count === 2) return '54px';
      if (count === 3) return '40px';
      if (count === 4) return '32px';
      return '24px';
    }

    function getCols(count) {
      return count <= 5 ? count : Math.ceil(count / 2);
    }

    function update() {
      document.getElementById('status').textContent = 'updating...';

      fetch(GAS_URL + '?json=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var codes = data.codes;
          var count = codes.length;

          if (count === 0) {
            document.body.className = 'no-codes';
            document.getElementById('status').textContent = 'no codes today';
          } else {
            document.body.className = 'has-codes';
            document.getElementById('today-text').textContent = data.today;

            var fs = getFontSize(count);
            var cols = getCols(count);
            var cards = document.getElementById('cards');
            cards.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';

            var html = '';
            for (var i = 0; i < codes.length; i++) {
              var spaced = codes[i].code.split('').join(' ');
              html += '<div class="card" style="font-size:' + fs + '">' +
                '<span class="name">' + codes[i].name + '</span>' +
                '<span class="separator"> — </span>' +
                '<span class="code">' + spaced + '</span>' +
              '</div>';
            }
            cards.innerHTML = html;

            var now = new Date();
            var timeStr = now.getHours() % 12 || 12;
            timeStr += ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            timeStr += now.getHours() >= 12 ? ' PM' : ' AM';
            document.getElementById('status').textContent = 'last updated ' + timeStr;
          }
        })
        .catch(function(err) {
          document.getElementById('status').textContent = 'retrying...';
          console.log('fetch error:', err);
        });
    }

    // Run immediately, then every 60 seconds
    update();
    setInterval(update, 60000);
  </script>

</body>
</html>
