<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, orientation=landscape">
  <title>Delivery Codes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 2rem;
      background: #1c1c1e;
      transition: background 0.4s ease;
    }

    /* BLANK SCREEN */
    .blank-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    body.showing-button .blank-screen,
    body.showing-codes .blank-screen { display: none; }

    .blank-clock {
      font-size: 103px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -3px;
      line-height: 1;
    }

    .blank-date {
      font-size: 24px;
      color: #888;
      margin-bottom: 18px;
    }

    .blank-weather {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 21px;
      color: #666;
    }

    .blank-weather .w-temp {
      font-size: 37px;
      font-weight: 500;
      color: #fff;
    }

    .blank-weather .w-divider {
      width: 1px;
      height: 28px;
      background: #444;
      margin: 0 4px;
    }

    /* BUTTON SCREEN */
    .button-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .button-screen .amazon-logo img {
      height: 44px;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }

    .home-btn {
      background: #FF9900;
      color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 1.25rem 3rem;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .home-btn:active {
      transform: scale(0.97);
      background: #e88a00;
    }

    /* CODES SCREEN */
    .codes-screen {
      display: none;
      width: 100%;
      max-width: 1100px;
      flex-direction: column;
      align-items: center;
    }

    body.showing-codes {
      background: #ffffff;
      justify-content: flex-start;
    }

    body.showing-codes .codes-screen { display: flex; }
    body.showing-codes .button-screen { display: none; }

    body.showing-button .button-screen { display: flex; }
    body.showing-button .codes-screen { display: none; }

    /* HEADER ROW */
    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.75rem;
      border-bottom: 1px solid #ebebeb;
      margin-bottom: 1rem;
    }

    .top-bar .amazon-logo img { height: 30px; }

    .top-bar-center {
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 6px;
      vertical-align: middle;
    }

    .today { font-size: 13px; color: #999; margin-bottom: 2px; }

    .title-main {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.02em;
    }

    .title-sub {
      font-size: 11px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .page-indicator {
      font-size: 13px;
      color: #aaa;
      min-width: 80px;
      text-align: right;
    }

    /* CARDS GRID - landscape: 2 columns */
    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }

    .card {
      background: #f7f7f7;
      border: 1px solid #ebebeb;
      border-radius: 14px;
      padding: 1rem 1.5rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.2rem;
    }

    .name { font-weight: 600; color: #111; }
    .separator { color: #bbb; font-weight: 300; margin: 0 0.3em; }
    .code {
      font-weight: 600;
      color: #111;
      letter-spacing: 0.1em;
      font-variant-numeric: tabular-nums;
    }

    /* PAGINATION */
    .pagination {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      min-height: 52px;
    }

    .page-btn {
      background: #111;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      padding: 0.65rem 1.75rem;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      visibility: hidden;
    }

    .page-btn.visible { visibility: visible; }
    .page-btn:active { transform: scale(0.97); background: #333; }

    /* STATUS + COUNTDOWN */
    .status {
      position: fixed;
      bottom: 0.75rem;
      right: 1rem;
      font-size: 11px;
      color: #444;
      font-family: monospace;
    }

    body.showing-codes .status { color: #ccc; }

    .countdown-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: #FF9900;
      width: 100%;
      transform-origin: left;
      display: none;
    }
  </style>
</head>
<body>

  <!-- BLANK SCREEN (clock + weather) -->
  <div class="blank-screen">
    <div class="blank-clock" id="blank-clock"></div>
    <div class="blank-date" id="blank-date"></div>
    <div class="blank-weather" id="blank-weather"></div>
  </div>

  <!-- BUTTON SCREEN -->
  <div class="button-screen">
    <div class="amazon-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
    </div>
    <button class="home-btn" onclick="showCodes()">Click here for Amazon Delivery Codes</button>
  </div>

  <!-- CODES SCREEN -->
  <div class="codes-screen">
    <div class="top-bar">
      <div class="amazon-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
      </div>
      <div class="top-bar-center">
        <div class="today"><span class="dot"></span><span id="today-text"></span></div>
        <div class="title-main">One-Time Password</div>
        <div class="title-sub">Delivery Codes</div>
      </div>
      <div class="page-indicator" id="page-indicator"></div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="pagination">
      <button class="page-btn" id="prev-btn" onclick="changePage(-1)">← Prev Page</button>
      <button class="page-btn" id="next-btn" onclick="changePage(1)">Next Page →</button>
    </div>
  </div>

  <div class="status" id="status">checking...</div>
  <div class="countdown-bar" id="countdown-bar"></div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzFRcUINLVndvIHar-ul28an2R8rzK6koqUB-_DfvLV4Q_9HuRsNKU57tNK1Tuw-gj_WQ/exec';
    var RETURN_AFTER_MS = 10 * 60 * 1000;
    var PER_PAGE = 8;
    var autoReturnTimer = null;
    var cachedCodes = [];
    var cachedToday = '';
    var currentPage = 0;

    function getFontSize(count) {
      if (count <= 2) return '36px';
      if (count <= 4) return '28px';
      if (count <= 6) return '24px';
      return '20px';
    }

    function renderPage() {
      var codes = cachedCodes;
      var totalPages = Math.ceil(codes.length / PER_PAGE);
      var start = currentPage * PER_PAGE;
      var pageCodes = codes.slice(start, start + PER_PAGE);
      var count = pageCodes.length;

      var fs = getFontSize(count);
      var cards = document.getElementById('cards');

      var html = '';
      for (var i = 0; i < pageCodes.length; i++) {
        var spaced = pageCodes[i].code.split('').join(' ');
        html += '<div class="card" style="font-size:' + fs + '">' +
          '<span class="name">' + pageCodes[i].name + '</span>' +
          '<span class="separator"> — </span>' +
          '<span class="code">' + spaced + '</span>' +
        '</div>';
      }
      cards.innerHTML = html;

      // Page indicator
      if (totalPages > 1) {
        document.getElementById('page-indicator').textContent = 'Page ' + (currentPage + 1) + ' of ' + totalPages;
      } else {
        document.getElementById('page-indicator').textContent = '';
      }

      // Prev button
      var prevBtn = document.getElementById('prev-btn');
      if (currentPage > 0) {
        prevBtn.classList.add('visible');
      } else {
        prevBtn.classList.remove('visible');
      }

      // Next button
      var nextBtn = document.getElementById('next-btn');
      if (currentPage < totalPages - 1) {
        nextBtn.classList.add('visible');
      } else {
        nextBtn.classList.remove('visible');
      }
    }

    function changePage(dir) {
      var totalPages = Math.ceil(cachedCodes.length / PER_PAGE);
      currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
      renderPage();
    }

    function startCountdown() {
      var bar = document.getElementById('countdown-bar');
      bar.style.display = 'block';
      bar.style.transition = 'none';
      bar.style.transform = 'scaleX(1)';
      bar.offsetHeight;
      bar.style.transition = 'transform ' + (RETURN_AFTER_MS / 1000) + 's linear';
      bar.style.transform = 'scaleX(0)';
      autoReturnTimer = setTimeout(function() {
        document.body.className = 'showing-button';
        bar.style.display = 'none';
        document.getElementById('status').textContent = '';
      }, RETURN_AFTER_MS);
    }

    function showCodes() {
      currentPage = 0;
      document.body.className = 'showing-codes';
      document.getElementById('today-text').textContent = cachedToday;
      renderPage();

      var now = new Date();
      var h = now.getHours() % 12 || 12;
      var m = (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
      var ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      document.getElementById('status').textContent = 'last updated ' + h + ':' + m + ' ' + ampm;

      clearTimeout(autoReturnTimer);
      startCountdown();
    }

    function checkCodes() {
      fetch(GAS_URL + '?json=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          cachedCodes = data.codes;
          cachedToday = data.today;
          document.getElementById('status').textContent = '';

          if (cachedCodes.length > 0) {
            if (document.body.className !== 'showing-codes') {
              document.body.className = 'showing-button';
            }
          } else {
            if (document.body.className !== 'showing-codes') {
              document.body.className = '';
            }
          }
        })
        .catch(function(err) {
          console.log('fetch error:', err);
          document.getElementById('status').textContent = '';
        });
    }

    // Clock
    function tick() {
      var now = new Date();
      var h = now.getHours() % 12 || 12;
      var m = now.getMinutes();
      var ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      document.getElementById('blank-clock').textContent = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('blank-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
    }
    tick();
    setInterval(tick, 1000);

    // Weather via wttr.in
    function fetchWeather() {
      fetch('https://wttr.in/La+Mirada,CA?format=j1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var current = data.current_condition[0];
          var tempF = current.temp_F;
          var desc = current.weatherDesc[0].value;
          var icon = getWeatherIcon(current.weatherCode);
          document.getElementById('blank-weather').innerHTML =
            '<span style="font-size:28px">' + icon + '</span>' +
            '<span class="w-temp">' + tempF + '°F</span>' +
            '<div class="w-divider"></div>' +
            '<span>' + desc + ' · La Mirada</span>';
        })
        .catch(function() {
          document.getElementById('blank-weather').innerHTML = '<span>La Mirada, CA</span>';
        });
    }

    function getWeatherIcon(code) {
      code = parseInt(code);
      if (code === 113) return '☀️';
      if (code === 116) return '⛅';
      if (code === 119 || code === 122) return '☁️';
      if (code >= 176 && code <= 263) return '🌦️';
      if (code >= 266 && code <= 321) return '🌧️';
      if (code >= 323 && code <= 395) return '🌨️';
      if (code >= 386 && code <= 395) return '⛈️';
      return '🌡️';
    }

    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);

    checkCodes();
    setInterval(checkCodes, 60000);
  </script>

</body>
</html>
